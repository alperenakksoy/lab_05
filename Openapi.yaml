openapi: 3.1.0

info:
  title: Vehicle Tracking API
  description: Comprehensive API for managing fleet vehicles
  version: 1.0
  contact:
    name: Ahmet Alperen Aksoy
    email: Ahmet-Alperen.Aksoy@hsrw.org

servers:
  - url: http://localhost/api/v1
    description: Local development — API Version 1
  - url: http://localhost/api/v2
    description: Local development — API Version 2
paths:

  /health:
    get:
      summary: Check API status
      responses:
        "200":
          description: OK

  /api/versions:
    get:
      summary: List API versions
      responses:
        "200":
          description: Versions list

  /vehicles:
    get:
      summary: Get vehicles (v1)
      responses:
        "200":
          description: List of vehicles

    post:
      summary: Create vehicle (v1)
      responses:
        "201":
          description: Created

  /vehicles/{id}:
    get:
      summary: Get vehicle by ID (v1)
      responses:
        "200":
          description: Found

    put:
      summary: Update vehicle (v1)

    delete:
      summary: Delete vehicle (v1)

  /v2/vehicles:
    get:
      summary: Get vehicles (v2)
      description: Uses "registration" instead of "plate"

    post:
      summary: Create vehicle (v2)

  /v2/vehicles/{id}:
    get:
      summary: Get vehicle (v2)

    put:
      summary: Update vehicle (v2)

    delete:
      summary: Delete vehicle (v2)

components:

  schemas:

    VehicleV1:
      type: object
      properties:
        id:
          type: integer
        plate:
          type: string
        model:
          type: string

    VehicleV2:
      type: object
      properties:
        id:
          type: integer
        registration:
          type: string
        model:
          type: string
        coordinates:
          type: object
          properties:
            latitude:
              type: number
            longitude:
              type: number